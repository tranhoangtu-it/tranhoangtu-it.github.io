<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ACCESS DENIED</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#ff0000;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.container{text-align:center;position:relative;z-index:1}
h1{font-size:120px;text-shadow:0 0 20px #ff0000,0 0 40px #ff000080;animation:pulse 2s infinite}
h2{font-size:24px;color:#ff6347;margin:20px 0}
.msg{color:#888;font-size:14px;margin:10px 0}
.box{border:2px solid #ff0000;padding:20px 40px;display:inline-block;margin:30px 0}
.back{color:#00ff41;text-decoration:none;font-size:16px;border:1px solid #00ff41;padding:10px 30px;display:inline-block;margin-top:20px;transition:all .3s}
.back:hover{background:#00ff41;color:#0a0a0a;box-shadow:0 0 20px #00ff41}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.scan{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,0,0,.02) 2px,rgba(255,0,0,.02) 4px);pointer-events:none;z-index:10}
</style>
</head>
<body>
<div class="scan"></div>
<div class="container">
<div class="box">
<h1>403</h1>
<h2>ACCESS DENIED</h2>
<div class="msg">INSUFFICIENT CLEARANCE LEVEL</div>
<div class="msg">This sector requires OMEGA authorization.</div>
<div class="msg" style="color:#555;margin-top:15px">Incident logged. IP recorded. Agent T. notified.</div>
</div>
<div><a href="/" class="back">&larr; RETURN TO OPERATIONS CENTER</a></div>
</div>
</body>
</html>
